      margin-bottom: 10px;
    }

      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
    }

    select, textarea {
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      font-family: monospace;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2d7ef7;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      white-space: pre-wrap;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      min-height: 120px;
      font-family: monospace;
    }

    .line-block {
      margin-bottom: 16px;
      padding: 12px;
      border-left: 4px solid #ddd;
      background: #fff;
      border-radius: 6px;
    }

    .diff-correct {
      background: #dff5e1;
      color: #1f7a2e;
      font-weight: bold;
      padding: 1px 3px;
      border-radius: 4px;
    }

    .diff-student {
      background: #ffe0e0;
      color: #c62828;
      font-weight: bold;
      padding: 1px 3px;
      border-radius: 4px;
    }

    .hint {
      margin-top: 8px;
      color: #333;
      font-weight: bold;
    }

    .ok-message {
      color: #1f7a2e;
      font-weight: bold;
      font-size: 18px;
    }

function normalizeCode(code) {
  return code
    .replace(/img`[\s\S]*?`/g, "img`<IMG>`")
    .replace(/tilemap`[\s\S]*?`/g, "tilemap`<TILEMAP>`")
    .replace(/\r\n/g, "\n")
    .replace(/\r/g, "\n")
    .split("\n")
    .map(line => line.trim())
    .join("\n")
    .trim();
}

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function getDifferencePosition(correctLine, studentLine) {
      let start = 0;
      const minLength = Math.min(correctLine.length, studentLine.length);

      while (start < minLength && correctLine[start] === studentLine[start]) {
        start++;
      }

      let endCorrect = correctLine.length - 1;
      let endStudent = studentLine.length - 1;

      while (
        endCorrect >= start &&
        endStudent >= start &&
        correctLine[endCorrect] === studentLine[endStudent]
      ) {
        endCorrect--;
        endStudent--;
      }

      return {
        start,
        endCorrect,
        endStudent
      };
    }

    function highlightDifference(line, start, end, className) {
      if (line === "") {
        return "<span class=\"" + className + "\">(なし)</span>";
      }

      if (start > line.length - 1) {
        return escapeHtml(line);
      }

      const before = escapeHtml(line.slice(0, start));
      const diff = escapeHtml(line.slice(start, end + 1));
      const after = escapeHtml(line.slice(end + 1));

      if (!diff) {
        return escapeHtml(line);
      }

      return before + "<span class=\"" + className + "\">" + diff + "</span>" + after;
    }

function getHint(correct, student) {
  if (correct === "" && student !== "") {
    return "この行はいらないかも！（行を1つ消してみよう）";
  }

  if (correct !== "" && student === "") {
    return "この行がまだ書かれていないみたい。追加してみよう。";
  }

  const correctImg = correct.match(/img`[\s\S]*?`/g) || [];
  const studentImg = student.match(/img`[\s\S]*?`/g) || [];

  const correctAssetImages = correct.match(/assets\.image`[^`]*`/g) || [];
  const studentAssetImages = student.match(/assets\.image`[^`]*`/g) || [];

  const correctTiles = correct.match(/assets\.tile`[^`]*`/g) || [];
  const studentTiles = student.match(/assets\.tile`[^`]*`/g) || [];

  // img
  if (correctImg.length > 0 && studentImg.length === 0) {
    return "画像（img）が抜けているかも！";
  }

  if (studentImg.length < correctImg.length) {
    return "画像（img）が足りないかも！";
  }

  if (studentImg.length > correctImg.length) {
    return "画像（img）が多いかも！";
  }

  if (
    correctImg.length > 0 &&
    studentImg.length > 0 &&
    correctImg.join("|") !== studentImg.join("|")
  ) {
    return "違う画像（img）を使っているかも！";
  }

  // assets.image
  if (correctAssetImages.length > 0 && studentAssetImages.length === 0) {
    return "画像（assets.image）が抜けているかも！";
  }

  if (studentAssetImages.length < correctAssetImages.length) {
    return "画像（assets.image）が足りないかも！";
  }

  if (studentAssetImages.length > correctAssetImages.length) {
    return "画像（assets.image）が多いかも！";
  }

  if (
    correctAssetImages.length > 0 &&
    studentAssetImages.length > 0 &&
    correctAssetImages.join("|") !== studentAssetImages.join("|")
  ) {
    return "違う画像（assets.image）を使っているかも！";
  }

  // assets.tile
  if (correctTiles.length > 0 && studentTiles.length === 0) {
    return "タイル（assets.tile）が抜けているかも！";
  }

  if (studentTiles.length < correctTiles.length) {
    return "タイル（assets.tile）が足りないかも！";
  }

  if (studentTiles.length > correctTiles.length) {
    return "タイル（assets.tile）が多いかも！";
  }

  if (
    correctTiles.length > 0 &&
    studentTiles.length > 0 &&
    correctTiles.join("|") !== studentTiles.join("|")
  ) {
    return "違うタイル（assets.tile）を使っているかも！";
  }

  if (correct.toLowerCase() === student.toLowerCase()) {
    return "大文字・小文字を確認してみよう。";
  }

  if (correct.replace(/\s/g, "") === student.replace(/\s/g, "")) {
    return "スペースや改行の位置を確認してみよう。";
  }

  const correctNoSymbols = correct.replace(/[.,(){}[\];]/g, "");
  const studentNoSymbols = student.replace(/[.,(){}[\];]/g, "");

  if (correctNoSymbols === studentNoSymbols) {
    return "カッコやカンマなどの記号を確認してみよう。";
  }

  if (correct.length === student.length) {
    return "単語のつづりをよく見比べてみよう。";
  }

  if (Math.abs(correct.length - student.length) > 5) {
    return "この行は大きく違うみたい。正解と見比べてみよう。";
  }

  return "惜しい！違う部分を見比べて直してみよう。";
}

    function checkAnswer(problemId, studentCode) {
      const correctCode = answers[problemId];

      if (!(problemId in answers)) {
        return {
          ok: false,
          message: "問題ID「" + problemId + "」の正解が見つかりません。"
        };
      }

      const correctLines = normalizeCode(correctCode).split("\n");
      const studentLines = normalizeCode(studentCode).split("\n");

      const mistakes = [];
      const maxLines = Math.max(correctLines.length, studentLines.length);

for (let i = 0; i < maxLines; i++) {
  const correctLine = (correctLines[i] ?? "").trim();
  const studentLine = (studentLines[i] ?? "").trim();

  if (correctLine !== studentLine) {
    mistakes.push({
      correct: correctLine,
      student: studentLine
    });
  }
}
      if (mistakes.length === 0) {
  return {
    ok: true,
    message: "正解です！よくできました👍"
  };
}

if (
  mistakes.length >= Math.ceil(correctLines.length * 0.4) ||
  mistakes.length >= 2) {
  return {
    ok: false,
    message: "間違いが多いみたいです。ステージの選択が合っているか確認してみよう👍",
    mistakes: mistakes
  };
}

return {
  ok: false,
  message: "ここを直せばOKです👇",
  mistakes: mistakes
};
    }

    function runCheck() {
      const problemId = document.getElementById("problemId").value;
      const studentCode = document.getElementById("studentCode").value;
      const resultArea = document.getElementById("result");

  if (problemId === "") {
  resultArea.innerHTML = "先にステージを選ぼう！";
  return;
}

      const result = checkAnswer(problemId, studentCode);

      if (result.ok) {
        resultArea.innerHTML = "<div class=\"ok-message\">" + escapeHtml(result.message) + "</div>";
        return;
      }

      if (!result.mistakes) {
        resultArea.innerHTML = escapeHtml(result.message);
        return;
      }

const firstMistake = result.mistakes[0];
const diffPosFirst = getDifferencePosition(firstMistake.correct, firstMistake.student);

const correctHtmlFirst = highlightDifference(
  firstMistake.correct,
  diffPosFirst.start,
  diffPosFirst.endCorrect,
  "diff-correct"
);

const studentHtmlFirst = highlightDifference(
  firstMistake.student,
  diffPosFirst.start,
  diffPosFirst.endStudent,
  "diff-student"
);

const hintFirst = getHint(firstMistake.correct, firstMistake.student);

let html = `
  <div>${escapeHtml(result.message)}</div><br>
  <div><strong>まずはここを直そう！</strong></div><br>
  <div class="line-block">
    <div>正解 : ${correctHtmlFirst}</div>
    <div>生徒 : ${studentHtmlFirst}</div>
    <div class="hint">ヒント: ${escapeHtml(hintFirst)}</div>
  </div>
`;

if (result.mistakes.length > 1) {
  html += `<br><div><strong>ほかのちがい</strong></div><br>`;
}

result.mistakes.slice(1).forEach((m) => {
  const diffPos = getDifferencePosition(m.correct, m.student);

  const correctHtml = highlightDifference(
    m.correct,
    diffPos.start,
    diffPos.endCorrect,
    "diff-correct"
  );

  const studentHtml = highlightDifference(
    m.student,
    diffPos.start,
    diffPos.endStudent,
    "diff-student"
  );

  const hint = getHint(m.correct, m.student);

  html += `
    <div class="line-block">
      <div>正解 : ${correctHtml}</div>
      <div>生徒 : ${studentHtml}</div>
      <div class="hint">ヒント: ${escapeHtml(hint)}</div>
    </div>
  `;
});

      resultArea.innerHTML = html;
