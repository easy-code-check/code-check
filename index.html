      background: #fff;

      margin-top: 8px;

      font-weight: bold;
    }

    .ok-message {
      color: #1f7a2e;
      font-weight: bold;
      font-size: 18px;

    .custom-selector {
  position: relative;
  margin-bottom: 12px;
}

.selector-button {
  width: 100%;
  text-align: left;

    <button onclick="resetAll()" style="background:#ccc;">リセット</button>

      if (!(problemId in answers)) {
        return {
          ok: false,
          message: "問題ID「" + problemId + "」の正解が見つかりません。"
        };
      }

      const correctLines = normalizeCode(correctCode).split("\n");
      const studentLines = normalizeCode(studentCode).split("\n");

      const mistakes = [];
      const maxLines = Math.max(correctLines.length, studentLines.length);

for (let i = 0; i < maxLines; i++) {
  const correctLine = (correctLines[i] ?? "").trim();
  const studentLine = (studentLines[i] ?? "").trim();

  if (correctLine !== studentLine) {
    mistakes.push({
      correct: correctLine,
      student: studentLine
    });
  }
}
      if (mistakes.length === 0) {
  return {
    ok: true,
    message: "正解です！よくできました👍"
  };
}

if (
  mistakes.length >= Math.ceil(correctLines.length * 0.6) ||
  mistakes.length >= 3) {
  return {
    ok: false,
    message: "間違いが多いみたいです。ステージの選択が合っているか確認してみよう👍",
    mistakes: mistakes
  };
}

return {
  ok: false,
  message: "ここを直せばOKです👇",
  mistakes: mistakes
};

let openStage = null;

function toggleStageList() {
  const stageList = document.getElementById("stageList");
  if (stageList.style.display === "none") {
    stageList.style.display = "block";
    renderStageList();
  } else {
    stageList.style.display = "none";
  }
}

function renderStageList() {
  const stageList = document.getElementById("stageList");
  stageList.innerHTML = "";

  Object.keys(problemGroups).forEach(stage => {
    const stageDiv = document.createElement("div");
    stageDiv.className = "stage-item";
    stageDiv.textContent = stage;

    stageDiv.onclick = () => {
      openStage = openStage === stage ? null : stage;
      renderStageList();
    };

    stageList.appendChild(stageDiv);

    if (openStage === stage) {
      problemGroups[stage].forEach(p => {
        const pDiv = document.createElement("div");
        pDiv.className = "problem-item";
        pDiv.textContent = p;

        pDiv.onclick = (e) => {
          e.stopPropagation();
          selectProblem(p);
        };

        stageList.appendChild(pDiv);
      });
    }
  });
}

function selectProblem(problemId) {
  document.getElementById("problemId").value = problemId;
  document.getElementById("selectorButton").textContent = problemId;
  document.getElementById("stageList").style.display = "none";
  openStage = null;
}

function runCheck() {
  const problemId = document.getElementById("problemId").value;
  const studentCode = document.getElementById("studentCode").value;
  const resultArea = document.getElementById("result");

  if (!problemId) {
    resultArea.innerHTML = "先に問題を選ぼう！";
    return;
  }

  if (studentCode.trim() === "") {
    resultArea.innerHTML = "コードを入力してください";
    return;
  }

  const result = checkAnswer(problemId, studentCode);

  if (result.ok) {
    resultArea.innerHTML = "<div class=\"ok-message\">" + escapeHtml(result.message) + "</div>";
    return;
  }

  if (!result.mistakes) {
    resultArea.innerHTML = escapeHtml(result.message);
    return;
  }

  const firstMistake = result.mistakes[0];
  const diffPosFirst = getDifferencePosition(firstMistake.correct, firstMistake.student);

  const correctHtmlFirst = highlightDifference(
    firstMistake.correct,
    diffPosFirst.start,
    diffPosFirst.endCorrect,
    "diff-correct"
  );

  const studentHtmlFirst = highlightDifference(
    firstMistake.student,
    diffPosFirst.start,
    diffPosFirst.endStudent,
    "diff-student"
  );

  const hintFirst = getHint(firstMistake.correct, firstMistake.student);

  let html = `
    <div>${escapeHtml(result.message)}</div><br>
    <div><strong>まずはここを直そう！</strong></div><br>
    <div class="line-block">
      <div>正解 : ${correctHtmlFirst}</div>
      <div>生徒 : ${studentHtmlFirst}</div>
      <div class="hint">ヒント: ${escapeHtml(hintFirst)}</div>
    </div>
  `;

  if (result.mistakes.length > 1) {
    html += `<br><div><strong>ほかのちがい</strong></div><br>`;
  }

  result.mistakes.slice(1).forEach((m) => {
    const diffPos = getDifferencePosition(m.correct, m.student);

    const correctHtml = highlightDifference(
      m.correct,
      diffPos.start,
      diffPos.endCorrect,
      "diff-correct"
    );

    const studentHtml = highlightDifference(
      m.student,
      diffPos.start,
      diffPos.endStudent,
      "diff-student"
    );

    const hint = getHint(m.correct, m.student);

    html += `
      <div class="line-block">
        <div>正解 : ${correctHtml}</div>
        <div>生徒 : ${studentHtml}</div>
        <div class="hint">ヒント: ${escapeHtml(hint)}</div>
      </div>
    `;
  });

  resultArea.innerHTML = html;
}
